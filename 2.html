<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
.header{header}+.container>(.container-left>.left-top{left-top}+.left-bottom{left-bottom})+(.container-right>.right-top{right-top}+.right-bottom>iframe)+.footer{footer}     
<div class="header">header</div>
<div class="container">
    <div class="container-left">
        <div class="left-top">left-top</div>
        <div class="left-bottom">left-bottom</div>
    </div>
    <div class="container-right">
        <div class="right-top">right-top</div>
        <div class="right-bottom">
            <iframe src="" frameborder="0"></iframe></div>
    </div>
    <div class="footer">footer</div>
</div>
</body>
</html>
