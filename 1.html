<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>校園社團介紹網</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .header {
            width: 1024px;
            height: 65px;
            margin: auto;
            border: 1px solid black;
            border-bottom: 0;
        }

        .container {
            width: 1024px;
            height: 683px;
            margin: auto;
            display: flex;
        }

        .container-left {
            width: 215px;
            display: flex;
            flex-direction: column;
        }

        .left-top {
            width: 100%;
            height: calc(100% - 25px);
            border: 1px solid black;
            border-right: 0;
        }

        .left-bottom {
            width: 100%;
            height: 25px;
            border: 1px solid black;
            border-right: 0;
            border-top: 0;
        }

        .container-right {
            width: calc(100% - 215px);
        }

        .right-top {
            width: 100%;
            height: 29px;
            border: 1px solid black;
        }

        .right-bottom {
            width: 100%;
            height: calc(100% - 29px);
            border: 1px solid black;
            border-top: 0;
        }

        .footer {
            width: 1024px;
            height: 20px;
            margin: auto;
            border: 1px solid black;
            border-top: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <div class="header">header</div>

    <div class="container">
        <div class="container-left">
            <div class="left-top">left-top</div>
            <div class="left-bottom">left-bottom</div>
        </div>
        <div class="container-right">
            <div class="right-top">right-top</div>
            <div class="right-bottom">
                <iframe></iframe>
            </div>
        </div>
    </div>

    <div class="footer">footer</div>

</body>

</html>
